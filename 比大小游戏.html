<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>比大小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            position: relative;
        }

        /* 标题 */
        .title {
            text-align: center;
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 等级选择界面 */
        .level-select {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .selection-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            width: 100%;
        }

        .group-label {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .buttons-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .level-btn, .card-count-btn {
            min-width: 100px;
            padding: 15px 25px;
            font-size: 1.1rem;
            border: 3px solid transparent;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .level-btn::before, .card-count-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .level-btn:hover::before, .card-count-btn:hover::before {
            left: 100%;
        }

        .level-btn:active, .card-count-btn:active {
            transform: scale(0.95);
        }

        .level-btn.selected, .card-count-btn.selected {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
            transform: scale(1.05);
        }

        .level-btn.beginner {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            color: #1a5c1a;
        }

        .level-btn.intermediate {
            background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%);
            color: #8b4513;
        }

        .level-btn.advanced {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: #fff;
        }

        .level-info {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
            font-weight: normal;
        }

        .start-game-btn {
            margin-top: 30px;
            padding: 20px 60px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            opacity: 0.5;
            pointer-events: none;
        }

        .start-game-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .start-game-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        /* 游戏界面 */
        .game-board {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .game-board.active {
            display: flex;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            color: #fff;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            gap: 10px;
        }

        .score-display {
            font-weight: bold;
            color: #ffd700;
        }

        /* 卡牌区域 */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
            align-items: center;
        }

        .player-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .section-label {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            font-weight: bold;
        }

        .cards-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            perspective: 1000px;
        }

        .card-wrapper {
            position: relative;
            width: 100px;
            height: 150px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        @media (min-width: 600px) {
            .card-wrapper {
                width: 120px;
                height: 180px;
            }
        }

        .card-wrapper:hover {
            transform: translateY(-10px);
        }

        .card-wrapper.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-wrapper.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.3);
        }

        @media (min-width: 600px) {
            .card-face {
                font-size: 3rem;
            }
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .card-back {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
        }

        .card-back::after {
            content: '?';
            font-size: 2.5rem;
            opacity: 0.8;
        }

        /* 总和显示 */
        .total-display {
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .total-display.show {
            opacity: 1;
        }

        /* 结果提示 */
        .result-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 30px 50px;
            border-radius: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            z-index: 1000;
            transition: transform 0.3s ease;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 90%;
        }

        .result-message.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .result-message.win {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .result-message.lose {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .result-message.draw {
            background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%);
        }

        .result-details {
            font-size: 1rem;
            margin-top: 10px;
            opacity: 0.9;
            font-weight: normal;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .new-round-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
        }

        /* 动画效果 */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.5s ease;
        }

        /* 提示文字 */
        .hint {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 20px;
        }

        /* 粒子效果背景 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .title {
                font-size: 1.8rem;
            }

            .level-btn, .card-count-btn {
                min-width: 80px;
                padding: 12px 15px;
                font-size: 0.9rem;
            }

            .card-wrapper {
                width: 80px;
                height: 120px;
            }

            .card-face {
                font-size: 2rem;
            }

            .cards-row {
                gap: 10px;
            }

            .result-message {
                font-size: 1.3rem;
                padding: 20px 30px;
            }

            .buttons-row {
                gap: 8px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- 粒子背景 -->
    <div class="particles" id="particles"></div>

    <div class="game-container">
        <!-- 标题 -->
        <h1 class="title">🎴 比大小游戏</h1>

        <!-- 等级选择 -->
        <div class="level-select" id="levelSelect">
            <!-- 难度选择 -->
            <div class="selection-group">
                <div class="group-label">选择难度</div>
                <div class="buttons-row">
                    <button class="level-btn beginner" onclick="selectLevel('beginner')">
                        🌱 初级
                        <div class="level-info">1-10</div>
                    </button>
                    <button class="level-btn intermediate" onclick="selectLevel('intermediate')">
                        ⚡ 中级
                        <div class="level-info">1-100</div>
                    </button>
                    <button class="level-btn advanced" onclick="selectLevel('advanced')">
                        🔥 高级
                        <div class="level-info">1-1000</div>
                    </button>
                </div>
            </div>

            <!-- 牌数量选择 -->
            <div class="selection-group">
                <div class="group-label">选择牌数</div>
                <div class="buttons-row">
                    <button class="card-count-btn" onclick="selectCardCount(1)">
                        🃏 1张牌
                    </button>
                    <button class="card-count-btn" onclick="selectCardCount(2)">
                        🎴 2张牌
                    </button>
                    <button class="card-count-btn" onclick="selectCardCount(3)">
                        🎴🎴 3张牌
                    </button>
                    <button class="card-count-btn" onclick="selectCardCount(4)">
                        🎴🎴🎴 4张牌
                    </button>
                </div>
            </div>

            <!-- 开始游戏按钮 -->
            <button class="start-game-btn" id="startGameBtn" onclick="startGame()">
                🚀 开始游戏
            </button>
        </div>

        <!-- 游戏界面 -->
        <div class="game-board" id="gameBoard">
            <div class="game-info">
                <div>等级: <span id="currentLevel" class="score-display"></span></div>
                <div>牌数: <span id="currentCardCount" class="score-display"></span>张</div>
                <div>得分: <span id="score" class="score-display">0</span></div>
            </div>

            <div class="hint">点击卡牌翻开，比较双方牌面总和！</div>

            <div class="cards-container">
                <!-- 玩家区域 -->
                <div class="player-section">
                    <div class="section-label">👤 你的牌</div>
                    <div class="cards-row" id="playerCards"></div>
                    <div class="total-display" id="playerTotal">总和: 0</div>
                </div>

                <!-- 电脑区域 -->
                <div class="player-section">
                    <div class="section-label">🤖 对手的牌</div>
                    <div class="cards-row" id="computerCards"></div>
                    <div class="total-display" id="computerTotal">总和: 0</div>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn new-round-btn" onclick="newRound()">🔄 再来一局</button>
                <button class="control-btn back-btn" onclick="backToMenu()">🏠 返回主菜单</button>
            </div>
        </div>

        <!-- 结果提示 -->
        <div class="result-message" id="resultMessage">
            <div id="resultText"></div>
            <div class="result-details" id="resultDetails"></div>
        </div>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            selectedLevel: null,
            selectedCardCount: null,
            level: null,
            cardCount: 2,
            maxNumber: 10,
            score: 0,
            playerCards: [],
            computerCards: [],
            playerFlipped: [],
            computerFlipped: [],
            roundEnded: false
        };

        // 等级配置
        const levels = {
            beginner: { name: '初级', max: 10 },
            intermediate: { name: '中级', max: 100 },
            advanced: { name: '高级', max: 1000 }
        };

        // 初始化粒子背景
        function initParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // 选择难度
        function selectLevel(level) {
            gameState.selectedLevel = level;

            // 更新按钮样式
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.closest('.level-btn').classList.add('selected');

            checkCanStart();
        }

        // 选择牌数
        function selectCardCount(count) {
            gameState.selectedCardCount = count;

            // 更新按钮样式
            document.querySelectorAll('.card-count-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.closest('.card-count-btn').classList.add('selected');

            checkCanStart();
        }

        // 检查是否可以开始游戏
        function checkCanStart() {
            const startBtn = document.getElementById('startGameBtn');
            if (gameState.selectedLevel && gameState.selectedCardCount) {
                startBtn.classList.add('active');
            }
        }

        // 开始游戏
        function startGame() {
            if (!gameState.selectedLevel || !gameState.selectedCardCount) return;

            gameState.level = gameState.selectedLevel;
            gameState.cardCount = gameState.selectedCardCount;
            gameState.maxNumber = levels[gameState.level].max;
            gameState.score = 0;

            document.getElementById('levelSelect').style.display = 'none';
            document.getElementById('gameBoard').classList.add('active');
            document.getElementById('currentLevel').textContent = levels[gameState.level].name;
            document.getElementById('currentCardCount').textContent = gameState.cardCount;
            document.getElementById('score').textContent = '0';

            newRound();
        }

        // 生成卡牌HTML
        function generateCards() {
            const playerContainer = document.getElementById('playerCards');
            const computerContainer = document.getElementById('computerCards');

            playerContainer.innerHTML = '';
            computerContainer.innerHTML = '';

            // 生成玩家卡牌
            for (let i = 0; i < gameState.cardCount; i++) {
                const card = document.createElement('div');
                card.className = 'card-wrapper';
                card.id = `playerCard${i}`;
                card.onclick = () => flipCard('player', i);
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front" id="playerValue${i}">?</div>
                        <div class="card-face card-back"></div>
                    </div>
                `;
                playerContainer.appendChild(card);
            }

            // 生成电脑卡牌
            for (let i = 0; i < gameState.cardCount; i++) {
                const card = document.createElement('div');
                card.className = 'card-wrapper';
                card.id = `computerCard${i}`;
                card.onclick = () => flipCard('computer', i);
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front" id="computerValue${i}">?</div>
                        <div class="card-face card-back"></div>
                    </div>
                `;
                computerContainer.appendChild(card);
            }
        }

        // 新一局
        function newRound() {
            // 重置状态
            gameState.playerCards = [];
            gameState.computerCards = [];
            gameState.playerFlipped = new Array(gameState.cardCount).fill(false);
            gameState.computerFlipped = new Array(gameState.cardCount).fill(false);
            gameState.roundEnded = false;

            // 生成随机数
            for (let i = 0; i < gameState.cardCount; i++) {
                gameState.playerCards.push(Math.floor(Math.random() * gameState.maxNumber) + 1);
                gameState.computerCards.push(Math.floor(Math.random() * gameState.maxNumber) + 1);
            }

            // 生成卡牌
            generateCards();

            // 设置数值
            for (let i = 0; i < gameState.cardCount; i++) {
                document.getElementById(`playerValue${i}`).textContent = gameState.playerCards[i];
                document.getElementById(`computerValue${i}`).textContent = gameState.computerCards[i];
            }

            // 隐藏总和
            document.getElementById('playerTotal').classList.remove('show');
            document.getElementById('computerTotal').classList.remove('show');

            // 隐藏结果
            hideResult();
        }

        // 翻牌
        function flipCard(who, index) {
            if (gameState.roundEnded) return;

            if (who === 'player' && !gameState.playerFlipped[index]) {
                document.getElementById(`playerCard${index}`).classList.add('flipped');
                gameState.playerFlipped[index] = true;
                checkRoundEnd();
            } else if (who === 'computer' && !gameState.computerFlipped[index]) {
                document.getElementById(`computerCard${index}`).classList.add('flipped');
                gameState.computerFlipped[index] = true;
                checkRoundEnd();
            }
        }

        // 检查回合结束
        function checkRoundEnd() {
            const allPlayerFlipped = gameState.playerFlipped.every(v => v);
            const allComputerFlipped = gameState.computerFlipped.every(v => v);

            if (allPlayerFlipped && allComputerFlipped) {
                gameState.roundEnded = true;

                // 禁用所有卡牌点击
                for (let i = 0; i < gameState.cardCount; i++) {
                    document.getElementById(`playerCard${i}`).classList.add('disabled');
                    document.getElementById(`computerCard${i}`).classList.add('disabled');
                }

                // 显示总和
                const playerSum = gameState.playerCards.reduce((a, b) => a + b, 0);
                const computerSum = gameState.computerCards.reduce((a, b) => a + b, 0);

                document.getElementById('playerTotal').textContent = `总和: ${playerSum}`;
                document.getElementById('computerTotal').textContent = `总和: ${computerSum}`;
                document.getElementById('playerTotal').classList.add('show');
                document.getElementById('computerTotal').classList.add('show');

                // 延迟显示结果
                setTimeout(() => showResult(playerSum, computerSum), 800);
            }
        }

        // 显示结果
        function showResult(playerSum, computerSum) {
            const messageEl = document.getElementById('resultMessage');
            const textEl = document.getElementById('resultText');
            const detailsEl = document.getElementById('resultDetails');

            let message = '';
            let className = '';

            if (playerSum > computerSum) {
                message = '🎉 你赢了！';
                className = 'win';
                gameState.score += 10;
                document.getElementById('score').textContent = gameState.score;

                // 玩家区域发光
                document.getElementById('playerCards').classList.add('pulse');
            } else if (playerSum < computerSum) {
                message = '😢 你输了！';
                className = 'lose';

                // 玩家区域摇晃
                document.getElementById('playerCards').classList.add('shake');
            } else {
                message = '🤝 平局！';
                className = 'draw';
            }

            textEl.textContent = message;
            detailsEl.innerHTML = `你的总和: ${playerSum} vs 对手总和: ${computerSum}`;

            messageEl.className = `result-message ${className} show`;

            // 3秒后自动隐藏
            setTimeout(hideResult, 3000);
        }

        // 隐藏结果
        function hideResult() {
            const messageEl = document.getElementById('resultMessage');
            messageEl.classList.remove('show', 'win', 'lose', 'draw');

            // 移除动画类
            document.getElementById('playerCards').classList.remove('pulse', 'shake');
        }

        // 返回主菜单
        function backToMenu() {
            document.getElementById('gameBoard').classList.remove('active');
            document.getElementById('levelSelect').style.display = 'flex';

            // 重置选择
            gameState.selectedLevel = null;
            gameState.selectedCardCount = null;
            document.querySelectorAll('.level-btn, .card-count-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.getElementById('startGameBtn').classList.remove('active');

            hideResult();
        }

        // 触摸事件支持（防止双击缩放）
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // 初始化
        initParticles();
    </script>
</body>
</html>
