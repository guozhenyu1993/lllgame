<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        /* 游戏整体样式 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        /* 游戏容器 */
        #game-container {
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        /* 游戏画布 */
        #game-board {
            border: 2px solid #333;
            background-color: #f8f8f8;
        }

        /* 分数显示 */
        #score {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* 控制提示 */
        #controls {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score">分数: 0</div>
        <canvas id="game-board" width="400" height="400"></canvas>
        <div id="controls">方向键控制蛇的移动 | 按空格暂停/继续</div>
    </div>

    <script>
        // 1. 获取画布和上下文
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // 2. 游戏配置
        const gridSize = 20; // 格子大小（像素）
        const tileCount = canvas.width / gridSize; // 格子数量
        let snake = []; // 蛇的身体（由坐标组成）
        let food = {}; // 食物坐标
        let direction = 'right'; // 初始方向
        let nextDirection = 'right'; // 下一个方向（防止快速转向）
        let score = 0;
        let gameLoop; // 游戏循环
        let isPaused = false; // 暂停状态

        // 3. 初始化游戏
        function initGame() {
            // 初始化蛇（初始长度3）
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            // 生成食物
            spawnFood();
            // 重置分数
            score = 0;
            scoreElement.textContent = `分数: ${score}`;
            // 重置方向
            direction = 'right';
            nextDirection = 'right';
            // 启动游戏循环（每100ms刷新一次）
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(updateGame, 100);
        }

        // 4. 生成食物（避免生成在蛇身上）
        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // 如果食物在蛇身上，重新生成
            if (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                spawnFood();
            }
        }

        // 5. 更新游戏状态（移动、碰撞检测等）
        function updateGame() {
            if (isPaused) return; // 暂停时不更新

            // 更新方向（防止180度转向）
            direction = nextDirection;

            // 1. 计算蛇头新位置
            const head = { ...snake[0] };
            switch (direction) {
                case 'up':
                    head.y -= 1;
                    break;
                case 'down':
                    head.y += 1;
                    break;
                case 'left':
                    head.x -= 1;
                    break;
                case 'right':
                    head.x += 1;
                    break;
            }

            // 2. 碰撞检测
            // 撞墙
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            // 撞自己
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            // 3. 添加新蛇头
            snake.unshift(head);

            // 4. 吃到食物？
            if (head.x === food.x && head.y === food.y) {
                score += 10; // 加分
                scoreElement.textContent = `分数: ${score}`;
                spawnFood(); // 生成新食物
            } else {
                snake.pop(); // 没吃到就移除尾巴（移动效果）
            }

            // 5. 绘制游戏
            drawGame();
        }

        // 6. 绘制游戏画面
        function drawGame() {
            // 清空画布
            ctx.fillStyle = '#f8f8f8';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制蛇
            snake.forEach((segment, index) => {
                // 蛇头和身体区分颜色
                ctx.fillStyle = index === 0 ? '#2ecc71' : '#27ae60';
                ctx.fillRect(
                    segment.x * gridSize,
                    segment.y * gridSize,
                    gridSize - 1, // 减1留缝隙，看起来更清晰
                    gridSize - 1
                );
            });

            // 绘制食物
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(
                food.x * gridSize,
                food.y * gridSize,
                gridSize - 1,
                gridSize - 1
            );
        }

        // 7. 游戏结束
        function gameOver() {
            clearInterval(gameLoop);
            alert(`游戏结束！你的分数: ${score}\n点击确定重新开始`);
            initGame(); // 重新开始
        }

        // 8. 键盘控制
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                // 方向控制（防止180度转向）
                case 'ArrowUp':
                    if (direction !== 'down') nextDirection = 'up';
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') nextDirection = 'down';
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') nextDirection = 'left';
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') nextDirection = 'right';
                    break;
                // 空格暂停/继续
                case ' ':
                    isPaused = !isPaused;
                    break;
            }
        });

        // 初始化游戏（页面加载后自动开始）
        initGame();
    </script>
</body>
</html>
