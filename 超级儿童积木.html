<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>超级积木搭建</title>
<style>
  *{box-sizing:border-box;}
  body{
    background:#f9f9f9;
    margin:0;
    padding:10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:Arial;
  }
  #game{
    width:420px;
    height:650px;
    background:#e6e6e6;
    border:3px solid #666;
    position:relative;
    overflow:hidden;
  }
  #floor{
    position:absolute;
    bottom:0;
    width:100%;
    height:10px;
    background:#666;
  }
  .block{
    position:absolute;
    border:2px solid #333;
  }
  #ctrl{
    margin-top:12px;
    display:flex;
    gap:10px;
  }
  button{
    padding:10px 18px;
    font-size:16px;
    background:#555;
    color:white;
    border:none;
    border-radius:8px;
  }
  #tips{
    margin-top:6px;
    font-size:14px;
    color:#333;
  }
</style>
</head>
<body>

<div id="game">
  <div id="floor"></div>
  <div id="current" class="block"></div>
</div>

<div id="ctrl">
  <button id="clearBtn">清空重来</button>
</div>
<div id="tips">←→移动  ↓放下  ↑变形</div>

<script>
const game = document.getElementById('game');
const current = document.getElementById('current');
const floor = document.getElementById('floor');
const clearBtn = document.getElementById('clearBtn');

// 12种颜色
const colors = [
  'red','blue','green','orange','purple',
  'pink','cyan','yellow','brown','lime',
  'magenta','gray'
];

// 9种形状
const shapes = [
  {w:40,h:40}, //正方
  {w:80,h:40}, //长方
  {w:40,h:80}, //竖长
  {w:60,h:40},
  {w:40,h:60},
  {w:100,h:40},
  {w:40,h:100},
  {w:60,h:60},
  {w:50,h:30}
];

let now;
let x,y;
const speed = 10;

function newBlock(){
  let s = shapes[Math.floor(Math.random()*shapes.length)];
  let c = colors[Math.floor(Math.random()*colors.length)];
  now = {w:s.w, h:s.h, color:c};
  current.style.width = now.w+'px';
  current.style.height = now.h+'px';
  current.style.backgroundColor = now.color;
  x = (game.offsetWidth - now.w)/2;
  y = 0;
  draw();
}

function draw(){
  current.style.left = x+'px';
  current.style.top = y+'px';
}

function drop(){
  let nextY = y + 10;
  let canFall = true;

  // 碰到地板
  let floorTop = game.offsetHeight - floor.offsetHeight;
  if(nextY + now.h >= floorTop) canFall = false;

  // 碰到下面积木
  let all = document.querySelectorAll('.block:not(#current)');
  for(let b of all){
    let bl = parseInt(b.style.left);
    let bt = parseInt(b.style.top);
    let bw = parseInt(b.style.width);
    let bh = parseInt(b.style.height);

    if(
      x < bl + bw &&
      x + now.w > bl &&
      nextY + now.h >= bt &&
      nextY < bt + bh
    ){
      canFall = false; break;
    }
  }

  if(canFall){
    y = nextY;
  }else{
    // 固定积木
    let nb = document.createElement('div');
    nb.className = 'block';
    nb.style.left = x+'px';
    nb.style.top = y+'px';
    nb.style.width = now.w+'px';
    nb.style.height = now.h+'px';
    nb.style.backgroundColor = now.color;
    game.appendChild(nb);
    newBlock();
  }
  draw();
}

// 变形
function rotate(){
  [now.w, now.h] = [now.h, now.w];
  current.style.width = now.w+'px';
  current.style.height = now.h+'px';
  draw();
}

// 清空
function clearAll(){
  document.querySelectorAll('.block:not(#current)').forEach(e=>e.remove());
  newBlock();
}

// 键盘
document.addEventListener('keydown',e=>{
  if(e.key=='ArrowLeft')  x = Math.max(0, x-speed);
  if(e.key=='ArrowRight') x = Math.min(game.offsetWidth-now.w, x+speed);
  if(e.key=='ArrowDown')  drop();
  if(e.key=='ArrowUp')    rotate();
  draw();
});

clearBtn.onclick = clearAll;
newBlock();
</script>
</body>
</html>
